<!-- Single-password sign-up (no confirm, no autocomplete): only the keyword hint disambiguates it. -->
<form>
  <h1>Create your account</h1>
  <label>Email <input type="email" name="email" id="su1-email"></label>
  <label>Password <input type="password" name="password" id="su1-pass"></label>
  <button type="submit">Register</button>
</form>
