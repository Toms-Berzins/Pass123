<!-- Change-password form WITHOUT autocomplete: the three-field count rule must catch it. -->
<form>
  <label>Old password <input type="password" name="old" id="cp2-old"></label>
  <label>New password <input type="password" name="new" id="cp2-new"></label>
  <label>Confirm <input type="password" name="confirm" id="cp2-confirm"></label>
  <button type="submit">Update password</button>
</form>
