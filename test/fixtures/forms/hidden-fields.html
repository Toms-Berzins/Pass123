<!-- Hidden/disabled decoys placed BEFORE the real fields. A honeypot username
     (hidden) and a disabled password must both be ignored by isVisible(). -->
<form>
  <input type="text" id="trap" name="username" hidden>
  <input type="text" id="trap2" name="login" style="display:none">
  <input type="text" id="real-user" name="account">
  <input type="password" id="disabled-pw" disabled>
  <input type="password" id="pass">
</form>
