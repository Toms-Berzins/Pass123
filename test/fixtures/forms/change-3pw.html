<!-- Change-password form: current + new + confirm. Must NOT be treated as a new sign-up. -->
<form>
  <label>Current password <input type="password" name="current" id="cp-current" autocomplete="current-password"></label>
  <label>New password <input type="password" name="new" id="cp-new" autocomplete="new-password"></label>
  <label>Confirm new password <input type="password" name="confirm" id="cp-confirm" autocomplete="new-password"></label>
  <button type="submit">Change password</button>
</form>
