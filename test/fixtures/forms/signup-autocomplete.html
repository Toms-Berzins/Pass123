<!-- Sign-up form, spec-annotated: new-password on both the password and confirm fields. -->
<form>
  <label>Email <input type="email" name="email" id="su-email" autocomplete="username"></label>
  <label>Password <input type="password" name="password" id="su-pass" autocomplete="new-password"></label>
  <label>Confirm password <input type="password" name="confirm" id="su-confirm" autocomplete="new-password"></label>
  <button type="submit">Create account</button>
</form>
