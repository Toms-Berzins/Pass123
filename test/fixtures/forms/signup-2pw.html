<!-- Sign-up form with NO autocomplete: classified by the two-password-field count rule. -->
<form>
  <label>Username <input type="text" name="username" id="su2-user"></label>
  <label>Password <input type="password" name="password" id="su2-pass"></label>
  <label>Repeat password <input type="password" name="password2" id="su2-confirm"></label>
  <button type="submit">Sign up</button>
</form>
