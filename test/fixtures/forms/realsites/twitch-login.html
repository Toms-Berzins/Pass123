<!-- twitch.tv/login — SPA login form with autocomplete tokens and aria-labels.
     Positional fallback is not needed: autocomplete="username" identifies the user field. -->
<form>
  <input id="login-username" type="text" autocomplete="username" aria-label="Enter your username" autocapitalize="off" autocorrect="off">
  <input id="password-input" type="password" autocomplete="current-password" aria-label="Enter your password">
  <button type="submit">Log in</button>
</form>
