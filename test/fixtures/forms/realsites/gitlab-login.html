<!-- Captured from gitlab.com/users/sign_in (2026-06, server-rendered). Bracketed
     field names (user[login]) plus a "Remember me" checkbox in the same form. -->
<form id="sign-in-form">
  <label for="user_login">Username or primary email</label>
  <input id="user_login" name="user[login]" type="text" required autocomplete="username" autocapitalize="off" autocorrect="off">
  <label for="user_password">Password</label>
  <input id="user_password" name="user[password]" type="password" required autocomplete="current-password">
  <input type="checkbox" id="user_remember_me" value="1">
  <label for="user_remember_me">Remember me</label>
  <button type="submit">Sign in</button>
</form>
