<!-- Captured from en.wikipedia.org/wiki/Special:UserLogin (2026-06, server-rendered).
     Two real traps: the site search box (must not be the username) and the
     multi-token autocomplete="username webauthn" on the real username field. -->
<input type="search" name="search" id="searchInput" placeholder="Search Wikipedia" aria-label="Search Wikipedia" autocomplete="off">
<form>
  <label for="wpName1">Username</label>
  <input id="wpName1" name="wpName" placeholder="Enter your username" autocomplete="username webauthn" autofocus>
  <label for="wpPassword1">Password</label>
  <input id="wpPassword1" name="wpPassword" type="password" placeholder="Enter your password" autocomplete="current-password">
  <button type="submit">Log in</button>
</form>
